<!DOCTYPE html>
<html>
<head>
    <title>Mon RPG Kaplay</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="start-menu" class="menu-overlay">
        <div class="menu-card">
            <h1 class="menu-title">Mon RPG</h1>
            <p class="menu-subtitle">Choisis une option pour commencer</p>

            <div class="menu-actions">
                <button id="btn-play" class="menu-btn primary">Jouer</button>
                <button id="btn-keys" class="menu-btn">Touches</button>
                <button id="btn-goal" class="menu-btn">But du jeu</button>
            </div>

            <div id="panel-keys" class="info-panel" hidden>
                <h2>Touches</h2>
                <p>Deplacement : fleches du clavier</p>
                <p>Passe dans les zones vertes pour changer de map.</p>
            </div>

            <div id="panel-goal" class="info-panel" hidden>
                <h2>But du jeu</h2>
                <p>Explore la foret et trouve les passages vers les autres zones.</p>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
